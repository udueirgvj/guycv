<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تطبيق Haidar الذكي</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif; }
        body { background-color: #0f172a; color: #f8fafc; display: flex; justify-content: center; align-items: center; height: 100vh; }
        .chat-container { width: 100%; max-width: 450px; height: 90vh; background: #1e293b; border-radius: 16px; display: flex; flex-direction: column; overflow: hidden; box-shadow: 0 10px 25px rgba(0,0,0,0.5); }
        .chat-header { background: #334155; padding: 16px; text-align: center; font-weight: bold; border-bottom: 1px solid #475569; }
        .chat-messages { flex: 1; padding: 16px; overflow-y: auto; display: flex; flex-direction: column; gap: 12px; }
        .message { max-width: 80%; padding: 10px 14px; border-radius: 12px; line-height: 1.4; }
        .user-message { background: #3b82f6; align-self: flex-start; }
        .ai-message { background: #475569; align-self: flex-end; }
        .chat-input-area { display: flex; padding: 12px; background: #334155; }
        .chat-input-area input { flex: 1; padding: 10px; border-radius: 8px; border: none; background: #1e293b; color: white; }
        .chat-input-area button { margin-right: 8px; padding: 10px 16px; border: none; background: #3b82f6; color: white; border-radius: 8px; cursor: pointer; }
    </style>
</head>
<body>

    <div class="chat-container">
        <div class="chat-header">المساعد الذكي - Haidar</div>
        <div class="chat-messages" id="chatMessages">
            <div class="message ai-message">أهلاً Haidar! أنا جاهز للدردشة، ماذا تريد أن نسأل اليوم؟</div>
        </div>
        <div class="chat-input-area">
            <input type="text" id="userInput" placeholder="اكتب رسالتك..." onkeypress="if(event.key==='Enter') sendMessage()">
            <button onclick="sendMessage()">إرسال</button>
        </div>
    </div>

    <script>
        // تم إضافة مفتاحك هنا
        const apiKey = "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"; 
        
        async function sendMessage() {
            const inputField = document.getElementById('userInput');
            const chatMessages = document.getElementById('chatMessages');
            const text = inputField.value.trim();
            if (!text) return;

            chatMessages.innerHTML += `<div class="message user-message">${text}</div>`;
            inputField.value = '';

            try {
                const response = await fetch("https://api.groq.com/openai/v1/chat/completions", {
                    method: 'POST',
                    headers: { 'Authorization': `Bearer ${apiKey}`, 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        model: "llama3-8b-8192",
                        messages: [{ role: "user", content: text }]
                    })
                });

                const data = await response.json();
                const reply = data.choices[0].message.content;
                chatMessages.innerHTML += `<div class="message ai-message">${reply}</div>`;
                chatMessages.scrollTop = chatMessages.scrollHeight;
            } catch (e) {
                chatMessages.innerHTML += `<div class="message ai-message">خطأ: تأكد من الاتصال.</div>`;
            }
        }
    </script>
</body>
</html>
